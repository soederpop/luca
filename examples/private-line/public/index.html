<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Private Line</title>
<style>
  :root {
    --bg: #0e1424;
    --surface: #161d31;
    --surface2: #1e263c;
    --border: rgba(200, 210, 235, 0.12);
    --text: #e9ecf5;
    --dim: #97a0b8;
    --gold: #e6c260;
    --green: #7dc97a;
    --red: #f2837b;
    --navy: #8fb3e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% -10%, rgba(143,179,224,0.10) 0%, transparent 55%);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .phone {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
  }
  h1 { font-weight: 400; font-size: 30px; letter-spacing: -0.5px; }
  h1 em { color: var(--navy); }
  .tagline {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 8px 0 28px;
  }
  .status {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px;
    color: var(--dim);
    min-height: 18px;
    margin-bottom: 20px;
  }
  .status.live { color: var(--green); }
  .status.err { color: var(--red); }

  .room-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 16px;
    letter-spacing: 2px;
    text-align: center;
    text-transform: lowercase;
    padding: 14px 10px;
    outline: none;
    min-width: 0;
  }
  input:focus { border-color: var(--navy); }

  button {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    padding: 14px 18px;
    cursor: pointer;
  }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--navy); border-color: var(--navy); color: #0e1424; font-weight: 600; }
  button.danger { background: var(--red); border-color: var(--red); color: #0e1424; font-weight: 600; }
  button:disabled { opacity: 0.4; cursor: default; }

  .call-controls { display: none; gap: 10px; justify-content: center; margin-top: 8px; }
  .call-controls button { flex: 1; }

  .verify {
    display: none;
    margin-top: 24px;
    padding: 16px;
    border-radius: 12px;
    background: rgba(125, 201, 122, 0.08);
    border: 1px solid rgba(125, 201, 122, 0.35);
  }
  .verify .vt {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }
  .verify .phrase {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .verify .hint { font-size: 12px; color: var(--dim); margin-top: 8px; font-style: italic; }

  .timer {
    display: none;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 30px;
    color: var(--text);
    margin: 18px 0 6px;
    font-variant-numeric: tabular-nums;
  }
  .foot {
    margin-top: 26px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 9.5px;
    letter-spacing: 1px;
    color: var(--dim);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="phone">
  <h1>The <em>Private Line</em></h1>
  <div class="tagline">peer-to-peer &middot; end-to-end encrypted</div>

  <div class="status" id="status">enter a room code to begin</div>

  <div class="room-row" id="joinRow">
    <input id="room" placeholder="room code" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button class="primary" id="joinBtn">Join</button>
  </div>

  <div class="timer" id="timer">00:00</div>

  <div class="call-controls" id="controls">
    <button id="muteBtn">Mute</button>
    <button class="danger" id="hangBtn">Hang up</button>
  </div>

  <div class="verify" id="verify">
    <div class="vt">&#128274; Safety phrase &mdash; compare out loud</div>
    <div class="phrase" id="phrase">&mdash;</div>
    <div class="hint">If you both see the same words, no one is in the middle.</div>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>

  <div class="foot">signaling: sealed relay &middot; media: dtls-srtp p2p</div>
</div>

<script>
const WORDS = ['acorn','amber','anchor','arrow','aspen','badge','banjo','bay','beacon','birch','bloom','breeze','brook','candle','canyon','cedar','chime','cliff','clover','coral','crane','dawn','delta','drift','eagle','ember','fable','falcon','fern','flint','forge','garnet','glade','grove','harbor','hazel','heron','iris','ivory','jade','juniper','kite','lagoon','lantern','laurel','linden','lotus','maple','meadow','mesa','moss','north','oak','opal','orchid','otter','pearl','pine','prairie','quartz','raven','reed','ridge','river','robin','saffron','sage','shore','sierra','slate','sparrow','spruce','stone','summit','thistle','tide','topaz','trail','tundra','vale','violet','walnut','willow','wren'];

const $ = id => document.getElementById(id);
const statusEl = $('status');

let ws, pc, localStream, joined = false, muted = false, timerInterval, callStart;
let makingOffer = false, polite = false;

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status' + (cls ? ' ' + cls : '');
}

function connectWs() {
  return new Promise((resolve, reject) => {
    ws = new WebSocket('wss://' + location.host);
    ws.onopen = () => resolve();
    ws.onerror = () => reject(new Error('signaling connection failed'));
    ws.onmessage = onSignalMessage;
    ws.onclose = () => { if (joined) setStatus('signaling lost — refresh to rejoin', 'err'); };
  });
}

async function join() {
  const room = $('room').value.trim().toLowerCase();
  if (!room) return setStatus('enter a room code first', 'err');
  $('joinBtn').disabled = true;
  try {
    setStatus('requesting microphone…');
    localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    setStatus('connecting…');
    await connectWs();
    ws.send(JSON.stringify({ type: 'join', room }));
  } catch (err) {
    $('joinBtn').disabled = false;
    setStatus(err.message || 'could not start', 'err');
  }
}

async function onSignalMessage(event) {
  const msg = JSON.parse(event.data);

  if (msg.type === 'error') {
    $('joinBtn').disabled = false;
    return setStatus(msg.error, 'err');
  }

  if (msg.type === 'joined') {
    joined = true;
    $('joinRow').style.display = 'none';
    // The second peer to arrive initiates the offer; the first is "polite"
    // and yields on offer collisions (perfect-negotiation-lite).
    polite = msg.peers === 0;
    createPeer();
    if (msg.peers === 1) {
      setStatus('peer is here — calling…');
    } else {
      setStatus('waiting for the other party… share the room code');
    }
    return;
  }

  if (msg.type === 'peer-joined') {
    setStatus('peer joined — connecting…');
    return;
  }

  if (msg.type === 'peer-left' || msg.type === 'hangup') {
    endCall('the other party ' + (msg.type === 'hangup' ? 'hung up' : 'left'));
    return;
  }

  if (msg.type === 'signal') {
    const data = msg.data;
    try {
      if (data.sdp) {
        const collision = data.sdp.type === 'offer' && (makingOffer || pc.signalingState !== 'stable');
        if (collision && !polite) return;
        if (collision && polite) await pc.setLocalDescription({ type: 'rollback' });
        await pc.setRemoteDescription(data.sdp);
        if (data.sdp.type === 'offer') {
          await pc.setLocalDescription(await pc.createAnswer());
          sendSignal({ sdp: pc.localDescription });
        }
      } else if (data.candidate) {
        await pc.addIceCandidate(data.candidate).catch(() => {});
      }
    } catch (err) {
      setStatus('negotiation error: ' + err.message, 'err');
    }
  }
}

function sendSignal(data) {
  ws.send(JSON.stringify({ type: 'signal', data }));
}

function createPeer() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = e => { if (e.candidate) sendSignal({ candidate: e.candidate }); };

  pc.onnegotiationneeded = async () => {
    // Only the impolite (second) peer initiates.
    if (polite) return;
    try {
      makingOffer = true;
      await pc.setLocalDescription();
      sendSignal({ sdp: pc.localDescription });
    } finally {
      makingOffer = false;
    }
  };

  pc.ontrack = e => { $('remoteAudio').srcObject = e.streams[0]; };

  pc.onconnectionstatechange = async () => {
    if (pc.connectionState === 'connected') {
      setStatus('● live — encrypted peer-to-peer', 'live');
      $('controls').style.display = 'flex';
      $('timer').style.display = 'block';
      startTimer();
      await showSafetyPhrase();
    }
    if (pc.connectionState === 'failed') setStatus('connection failed — check network', 'err');
    if (pc.connectionState === 'disconnected') setStatus('reconnecting…');
  };
}

async function showSafetyPhrase() {
  // Derive a phrase both sides can compare, from both DTLS cert
  // fingerprints (sorted so both ends compute identical words).
  const fps = [];
  for (const desc of [pc.localDescription, pc.remoteDescription]) {
    const m = desc && desc.sdp.match(/a=fingerprint:sha-256 ([A-F0-9:]+)/i);
    if (m) fps.push(m[1].toUpperCase());
  }
  if (fps.length < 2) return;
  fps.sort();
  const bytes = new TextEncoder().encode(fps.join('|'));
  const digest = new Uint8Array(await crypto.subtle.digest('SHA-256', bytes));
  const words = [0, 1, 2, 3].map(i => WORDS[digest[i] % WORDS.length]);
  $('phrase').textContent = words.join(' · ');
  $('verify').style.display = 'block';
}

function startTimer() {
  callStart = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - callStart) / 1000);
    $('timer').textContent = String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }, 500);
}

function endCall(reason) {
  clearInterval(timerInterval);
  if (pc) { pc.close(); pc = null; }
  $('controls').style.display = 'none';
  $('verify').style.display = 'none';
  $('timer').style.display = 'none';
  $('joinRow').style.display = 'flex';
  $('joinBtn').disabled = false;
  joined = false;
  setStatus(reason || 'call ended');
}

$('joinBtn').onclick = join;
$('room').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

$('hangBtn').onclick = () => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'hangup' }));
  endCall('you hung up');
};

$('muteBtn').onclick = () => {
  muted = !muted;
  localStream.getAudioTracks().forEach(t => { t.enabled = !muted; });
  $('muteBtn').textContent = muted ? 'Unmute' : 'Mute';
};
</script>
</body>
</html>
