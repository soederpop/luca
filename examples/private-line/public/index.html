<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Private Line</title>
<style>
  :root {
    --bg: #0e1424;
    --surface: #161d31;
    --surface2: #1e263c;
    --border: rgba(200, 210, 235, 0.12);
    --text: #e9ecf5;
    --dim: #97a0b8;
    --gold: #e6c260;
    --green: #7dc97a;
    --red: #f2837b;
    --navy: #8fb3e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% -10%, rgba(143,179,224,0.10) 0%, transparent 55%);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .phone {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
  }
  h1 { font-weight: 400; font-size: 30px; letter-spacing: -0.5px; }
  h1 em { color: var(--navy); }
  .tagline {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 8px 0 28px;
  }
  .status {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px;
    color: var(--dim);
    min-height: 18px;
    margin-bottom: 20px;
  }
  .status.live { color: var(--green); }
  .status.err { color: var(--red); }

  .room-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-align: center;
    text-transform: lowercase;
    padding: 14px 10px;
    outline: none;
    min-width: 0;
  }
  input:focus { border-color: var(--navy); }

  button {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    padding: 14px 18px;
    cursor: pointer;
  }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--navy); border-color: var(--navy); color: #0e1424; font-weight: 600; }
  button.danger { background: var(--red); border-color: var(--red); color: #0e1424; font-weight: 600; }
  button:disabled { opacity: 0.4; cursor: default; }

  .call-controls { display: none; gap: 10px; justify-content: center; margin-top: 8px; }
  .call-controls button { flex: 1; }

  .verify {
    display: none;
    margin-top: 24px;
    padding: 16px;
    border-radius: 12px;
    background: rgba(125, 201, 122, 0.08);
    border: 1px solid rgba(125, 201, 122, 0.35);
  }
  .verify.failed {
    background: rgba(242, 131, 123, 0.08);
    border-color: rgba(242, 131, 123, 0.45);
  }
  .verify .vt {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }
  .verify.failed .vt { color: var(--red); }
  .verify .hint { font-size: 12px; color: var(--dim); margin-top: 4px; font-style: italic; }

  .timer {
    display: none;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 30px;
    color: var(--text);
    margin: 18px 0 6px;
    font-variant-numeric: tabular-nums;
  }
  .foot {
    margin-top: 26px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 9.5px;
    letter-spacing: 1px;
    color: var(--dim);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="phone">
  <h1>The <em>Private Line</em></h1>
  <div class="tagline">peer-to-peer &middot; end-to-end encrypted</div>

  <div class="status" id="status">enter your shared safety phrase</div>

  <div class="room-row" id="joinRow">
    <input id="room" placeholder="five word safety phrase" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="genBtn" title="Generate a new random phrase">&#9860;</button>
    <button class="primary" id="joinBtn">Join</button>
  </div>

  <div class="timer" id="timer">00:00</div>

  <div class="call-controls" id="controls">
    <button id="muteBtn">Mute</button>
    <button class="danger" id="hangBtn">Hang up</button>
  </div>

  <div class="verify" id="verify">
    <div class="vt" id="verifyTitle">&#128274; Authenticated</div>
    <div class="hint" id="verifyHint">Both parties proved knowledge of the safety phrase. No one is in the middle.</div>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>

  <div class="foot">signaling: blind relay &middot; media: dtls-srtp p2p &middot; auth: phrase-keyed hmac</div>
</div>

<script>
const $ = id => document.getElementById(id);
const statusEl = $('status');
const enc = new TextEncoder();

let ws, pc, localStream, joined = false, muted = false, timerInterval, callStart;
let makingOffer = false, polite = false;
let authKey = null, myNonce = null, peerNonce = null, peerTag = null;
let myTagSent = false, verified = false, pendingRemoteStream = null, verifyTimeout = null;
let wordlist = null;

// ---- phrase-derived secrets ----
// The phrase never leaves this device. PBKDF2 stretches it into 64 bytes:
// the first 32 become the (opaque) room id the server sees, the last 32
// become an HMAC key used to authenticate the DTLS fingerprints, so a
// man-in-the-middle who doesn't know the phrase cannot complete a call.

const hex = bytes => [...bytes].map(b => b.toString(16).padStart(2, '0')).join('');

function normalizePhrase(raw) {
  return raw.trim().toLowerCase().split(/\s+/).join(' ');
}

async function deriveSecrets(phrase) {
  const utcDate = new Date().toISOString().slice(0, 10);
  const material = await crypto.subtle.importKey('raw', enc.encode(phrase), 'PBKDF2', false, ['deriveBits']);
  const bits = new Uint8Array(await crypto.subtle.deriveBits(
    { name: 'PBKDF2', hash: 'SHA-256', salt: enc.encode('private-line-v1|' + utcDate), iterations: 210000 },
    material, 512
  ));
  const roomId = hex(bits.slice(0, 32));
  authKey = await crypto.subtle.importKey('raw', bits.slice(32), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  return roomId;
}

async function hmacHex(str) {
  return hex(new Uint8Array(await crypto.subtle.sign('HMAC', authKey, enc.encode(str))));
}

// ---- phrase generation (EFF large wordlist, ~64 bits for 5 words) ----

async function getWordlist() {
  if (!wordlist) {
    const txt = await (await fetch('/wordlist.txt')).text();
    wordlist = txt.trim().split('\n').map(l => l.split('\t')[1]).filter(Boolean);
  }
  return wordlist;
}

function randomIndex(n) {
  const limit = Math.floor(65536 / n) * n;
  const buf = new Uint16Array(1);
  do { crypto.getRandomValues(buf); } while (buf[0] >= limit);
  return buf[0] % n;
}

async function generatePhrase() {
  try {
    const words = await getWordlist();
    $('room').value = Array.from({ length: 5 }, () => words[randomIndex(words.length)]).join(' ');
    setStatus('share this phrase privately — in person, never through this server');
  } catch {
    setStatus('could not load wordlist', 'err');
  }
}

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status' + (cls ? ' ' + cls : '');
}

function connectWs() {
  return new Promise((resolve, reject) => {
    ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
    ws.onopen = () => resolve();
    ws.onerror = () => reject(new Error('signaling connection failed'));
    ws.onmessage = onSignalMessage;
    ws.onclose = () => { if (joined) setStatus('signaling lost — refresh to rejoin', 'err'); };
  });
}

async function join() {
  const phrase = normalizePhrase($('room').value);
  if (!phrase) return setStatus('enter your safety phrase first', 'err');
  if (phrase.split(' ').length < 5) return setStatus('use at least five words — the ⚄ button generates a phrase', 'err');
  $('joinBtn').disabled = true;
  peerNonce = null; peerTag = null; myTagSent = false; verified = false;
  pendingRemoteStream = null;
  $('verify').style.display = 'none';
  try {
    setStatus('deriving keys from phrase…');
    const roomId = await deriveSecrets(phrase);
    myNonce = hex(crypto.getRandomValues(new Uint8Array(16)));
    setStatus('requesting microphone…');
    localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    setStatus('connecting…');
    await connectWs();
    ws.send(JSON.stringify({ type: 'join', room: roomId }));
  } catch (err) {
    $('joinBtn').disabled = false;
    setStatus(err.message || 'could not start', 'err');
  }
}

async function onSignalMessage(event) {
  const msg = JSON.parse(event.data);

  if (msg.type === 'error') {
    $('joinBtn').disabled = false;
    return setStatus(msg.error, 'err');
  }

  if (msg.type === 'joined') {
    joined = true;
    $('joinRow').style.display = 'none';
    // The second peer to arrive initiates the offer; the first is "polite"
    // and yields on offer collisions (perfect-negotiation-lite).
    polite = msg.peers === 0;
    createPeer();
    if (msg.peers === 1) {
      sendSignal({ authNonce: myNonce });
      setStatus('peer is here — calling…');
    } else {
      setStatus('waiting for the other party…');
    }
    return;
  }

  if (msg.type === 'peer-joined') {
    sendSignal({ authNonce: myNonce });
    setStatus('peer joined — connecting…');
    return;
  }

  if (msg.type === 'peer-left' || msg.type === 'hangup') {
    endCall('the other party ' + (msg.type === 'hangup' ? 'hung up' : 'left'));
    return;
  }

  if (msg.type === 'signal') {
    const data = msg.data;
    try {
      if (data.authNonce) {
        if (typeof data.authNonce === 'string' && /^[0-9a-f]{32}$/.test(data.authNonce)) {
          peerNonce = data.authNonce;
          await maybeAuthenticate();
        }
        return;
      }
      if (data.authTag) {
        peerTag = String(data.authTag);
        await maybeVerify();
        return;
      }
      if (data.sdp) {
        const collision = data.sdp.type === 'offer' && (makingOffer || pc.signalingState !== 'stable');
        if (collision && !polite) return;
        if (collision && polite) await pc.setLocalDescription({ type: 'rollback' });
        await pc.setRemoteDescription(data.sdp);
        if (data.sdp.type === 'offer') {
          await pc.setLocalDescription(await pc.createAnswer());
          sendSignal({ sdp: pc.localDescription });
        }
      } else if (data.candidate) {
        await pc.addIceCandidate(data.candidate).catch(() => {});
      }
    } catch (err) {
      setStatus('negotiation error: ' + err.message, 'err');
    }
  }
}

function sendSignal(data) {
  ws.send(JSON.stringify({ type: 'signal', data }));
}

function createPeer() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  // Mic stays silenced until the peer proves knowledge of the phrase —
  // a MITM completing the DTLS handshake must never receive real audio.
  localStream.getTracks().forEach(t => { t.enabled = false; pc.addTrack(t, localStream); });

  pc.onicecandidate = e => { if (e.candidate) sendSignal({ candidate: e.candidate }); };

  pc.onnegotiationneeded = async () => {
    // Only the impolite (second) peer initiates.
    if (polite) return;
    try {
      makingOffer = true;
      await pc.setLocalDescription();
      sendSignal({ sdp: pc.localDescription });
    } finally {
      makingOffer = false;
    }
  };

  pc.ontrack = e => {
    pendingRemoteStream = e.streams[0];
    if (verified) $('remoteAudio').srcObject = pendingRemoteStream;
  };

  pc.onconnectionstatechange = async () => {
    if (pc.connectionState === 'connected' && !verified) {
      setStatus('connected — verifying identity…');
      clearTimeout(verifyTimeout);
      verifyTimeout = setTimeout(() => authFail('verification timed out'), 15000);
      await maybeAuthenticate();
      await maybeVerify();
    }
    if (pc.connectionState === 'failed') setStatus('connection failed — check network', 'err');
    if (pc.connectionState === 'disconnected') setStatus('reconnecting…');
  };
}

// ---- phrase authentication ----
// Each side MACs the session (its role, both nonces, both DTLS cert
// fingerprints) with the phrase-derived key. If a MITM substituted
// fingerprints in signaling, or doesn't know the phrase, tags won't
// verify and the call fails closed before any audio flows.

function fingerprints() {
  const fp = d => {
    const m = d && d.sdp.match(/a=fingerprint:sha-256 ([A-F0-9:]+)/i);
    return m ? m[1].toUpperCase() : null;
  };
  return { mine: fp(pc.localDescription), theirs: fp(pc.remoteDescription) };
}

function authReady() {
  if (!pc || pc.connectionState !== 'connected' || !peerNonce) return null;
  const fps = fingerprints();
  return fps.mine && fps.theirs ? fps : null;
}

async function maybeAuthenticate() {
  const fps = authReady();
  if (!fps || myTagSent) return;
  myTagSent = true;
  const role = polite ? 'A' : 'B';
  sendSignal({ authTag: await hmacHex(`plv1|${role}|${myNonce}|${peerNonce}|${fps.mine}|${fps.theirs}`) });
}

async function maybeVerify() {
  const fps = authReady();
  if (!fps || !peerTag || verified) return;
  const theirRole = polite ? 'B' : 'A';
  const expected = await hmacHex(`plv1|${theirRole}|${peerNonce}|${myNonce}|${fps.theirs}|${fps.mine}`);
  if (peerTag === expected) onVerified();
  else authFail('safety phrase verification failed');
}

function onVerified() {
  verified = true;
  clearTimeout(verifyTimeout);
  localStream.getAudioTracks().forEach(t => { t.enabled = !muted; });
  if (pendingRemoteStream) $('remoteAudio').srcObject = pendingRemoteStream;
  setStatus('● live — authenticated & encrypted', 'live');
  $('controls').style.display = 'flex';
  $('timer').style.display = 'block';
  $('verify').className = 'verify';
  $('verifyTitle').innerHTML = '&#128274; Authenticated';
  $('verifyHint').textContent = 'Both parties proved knowledge of the safety phrase. No one is in the middle.';
  $('verify').style.display = 'block';
  startTimer();
}

function authFail(reason) {
  clearTimeout(verifyTimeout);
  if (pc) { pc.close(); pc = null; }
  if (ws && ws.readyState === WebSocket.OPEN) ws.close();
  localStream?.getTracks().forEach(t => t.stop());
  joined = false;
  $('controls').style.display = 'none';
  $('timer').style.display = 'none';
  $('joinRow').style.display = 'flex';
  $('joinBtn').disabled = false;
  $('verify').className = 'verify failed';
  $('verifyTitle').innerHTML = '&#9888; Call refused';
  $('verifyHint').textContent = 'This connection could not be authenticated with your phrase — possible interception, or the two of you typed different phrases. No audio was sent.';
  $('verify').style.display = 'block';
  setStatus(reason, 'err');
}

function startTimer() {
  callStart = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - callStart) / 1000);
    $('timer').textContent = String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }, 500);
}

function endCall(reason) {
  clearInterval(timerInterval);
  clearTimeout(verifyTimeout);
  if (pc) { pc.close(); pc = null; }
  localStream?.getTracks().forEach(t => t.stop());
  authKey = null; myNonce = null; peerNonce = null; peerTag = null;
  myTagSent = false; verified = false; pendingRemoteStream = null;
  $('remoteAudio').srcObject = null;
  $('controls').style.display = 'none';
  $('verify').style.display = 'none';
  $('timer').style.display = 'none';
  $('joinRow').style.display = 'flex';
  $('joinBtn').disabled = false;
  joined = false;
  setStatus(reason || 'call ended');
}

$('joinBtn').onclick = join;
$('genBtn').onclick = generatePhrase;
$('room').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

$('hangBtn').onclick = () => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'hangup' }));
  endCall('you hung up');
};

$('muteBtn').onclick = () => {
  muted = !muted;
  localStream.getAudioTracks().forEach(t => { t.enabled = !muted; });
  $('muteBtn').textContent = muted ? 'Unmute' : 'Mute';
};
</script>
</body>
</html>
